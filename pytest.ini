[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

markers =
    unit: Unit tests (no external services needed)
    integration: Integration tests (require DB/Redis)
    slow: Slow tests (ML model training)

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
